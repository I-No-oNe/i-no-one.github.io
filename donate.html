<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Ko-fi…</title>
    <meta name="robots" content="noindex">
    <!-- redirect as early as possible -->
    <meta http-equiv="refresh" content="0; url=https://ko-fi.com/i_no_am/">
    <script>window.location.replace("https://ko-fi.com/i_no_am/");</script>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/145749961?s=64&v=4" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; gap: 22px; text-align: center; padding: 20px;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #16a34a, #0ea5a3); color: #fff;
        }
        h1 { font-size: 1.4rem; font-weight: 700; }
        a { color: #16a34a; background: #fff; text-decoration: none; font-weight: 600;
            padding: 12px 24px; border-radius: 999px; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
        .loader { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.3);
            border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<h1>Redirecting to Ko-fi…</h1>
<div class="loader"></div>
<a href="https://ko-fi.com/i_no_am/">Click here if not redirected</a>
</body>
</html>
