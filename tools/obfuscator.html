        <div class="content-inner rise">
            <div class="container">
                <div class="header">
                    <h1>🔐 Obfuscator</h1>
                    <p class="subtitle">Secure text encoding &amp; decoding</p>
                </div>

                <div class="input-group">
                    <label for="inputText">Input Text</label>
                    <textarea id="inputText" class="field" placeholder="Enter text to encode or paste encoded text to decode..." autocomplete="off"></textarea>
                </div>

                <div class="input-group">
                    <label for="key">Encryption Key</label>
                    <input type="text" id="key" class="field" placeholder="Enter your secret key..." autocomplete="off">
                </div>

                <div class="button-group">
                    <button class="btn btn-primary btn-encode" onclick="encode()">🔒 Encode</button>
                    <button class="btn btn-decode" onclick="decode()">🔓 Decode</button>
                </div>

                <div class="output-container">
                    <div class="input-group">
                        <label for="outputText">Output</label>
                        <textarea id="outputText" class="field" placeholder="Output will appear here..." readonly autocomplete="off"></textarea>
                    </div>
                    <div class="action-buttons">
                        <button class="btn copy-btn" onclick="copyOutput()">📋 Copy Output</button>
                        <button class="btn download-btn" onclick="downloadHistory()">💾 Download History</button>
                    </div>
                </div>
            </div>
        </div>
