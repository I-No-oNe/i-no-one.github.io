    <link rel="stylesheet" href="server-checker/style.css">
    <link rel="icon" href="https://avatars.githubusercontent.com/u/145749961?s=64&v=4" type="image/png">
    <script>(function(){var t;try{t=localStorage.getItem('theme')}catch(e){}if(!t){var m=document.cookie.match(/(?:^|; )theme=(dark|light)/);t=m?m[1]:'light'}document.documentElement.setAttribute('data-theme',t)})();</script>
    <script defer src="../site/theme.js"></script>
</head>
<body>
<div class="aurora" aria-hidden="true"><span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span></div>

<div id="nav-scrim" class="nav-scrim"></div>
<div class="layout">
    <aside class="sidebar">
        <a class="side-brand" href="../index.html"><img src="https://avatars.githubusercontent.com/u/145749961?s=64&v=4" alt=""><span>I-No-oNe</span></a>

        <div class="side-foot">
            <a class="btn btn-primary side-donate" href="../donate.html" rel="noopener noreferrer">☕ Donate</a>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
                <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg>
            </button>
        </div>
    </aside>

    <main class="content">
        <div class="content-inner rise">
            <div class="container">
                <div class="header">
                    <div class="minecraft-logo">
                        <h1>⛏️ Minecraft</h1>
                        <h2>Server Status Checker</h2>
                    </div>
                    <p class="subtitle">Check the status of any Minecraft server</p>
                </div>

                <div class="search-box">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label for="hostInput">Server Address</label>
                            <input type="text" id="hostInput" class="field" placeholder="hypixel.net" value="">
                        </div>
                        <div class="input-wrapper port-wrapper">
                            <label for="portInput">Port</label>
                            <input type="number" id="portInput" class="field port-input" placeholder="25565" value="25565">
                        </div>
                    </div>
                    <button class="btn btn-primary minecraft-btn" onclick="checkServer()">
                        <span class="btn-text">Check Server</span>
                    </button>

                    <div class="popular-servers">
                        <span class="label">Popular servers</span>
                        <div class="server-tags">
                            <div class="server-tag" onclick="setServer('hypixel.net', 25565)">Hypixel</div>
                            <div class="server-tag" onclick="setServer('2b2t.org', 25565)">2b2t</div>
                            <div class="server-tag" onclick="setServer('us.mineplex.com', 25565)">Mineplex</div>
                            <div class="server-tag" onclick="setServer('play.cubecraft.net', 25565)">CubeCraft</div>
                        </div>
                    </div>
                </div>

                <div id="historyContainer" class="history-container">
                    <div class="history-header">
                        <h3>Recent Servers</h3>
                        <button onclick="clearHistory()" class="clear-history-btn">Clear History</button>
                    </div>
                    <div id="historyList" class="history-list"></div>
                </div>

                <div class="results" id="results"></div>
            </div>
        </div>
    </main>
</div>

<div id="notification" class="notification"></div>
<script src="server-checker/script.js"></script>
</body>
